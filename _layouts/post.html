---
layout: default
---
<article class="page container narrow">
  <header class="page-header">
    <p class="eyebrow"><a href="{{ '/blog/' | relative_url }}">Blog</a> · <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%B %-d, %Y" }}</time></p>
    <h1>{{ page.title }}</h1>
    {% if page.subtitle %}<p class="lede">{{ page.subtitle }}</p>{% endif %}
    {% if page.tags and page.tags.size > 0 %}
      <ul class="tags">
        {% for tag in page.tags %}<li>#{{ tag }}</li>{% endfor %}
      </ul>
    {% endif %}
  </header>
  <div class="prose">
    {{ content }}
  </div>
  <p class="back"><a href="{{ '/blog/' | relative_url }}">← Back to all posts</a></p>
</article>
