---
layout: default
---
<article class="page container narrow">
  <header class="page-header">
    {% if page.eyebrow %}<p class="eyebrow">{{ page.eyebrow }}</p>{% endif %}
    <h1>{{ page.title }}</h1>
    {% if page.subtitle %}<p class="lede">{{ page.subtitle }}</p>{% endif %}
  </header>
  <div class="prose">
    {{ content }}
  </div>
</article>
