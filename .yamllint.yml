---
# yamllint configuration for CI (validate / yaml-lint).
# Checked paths: .github/ and _config.yml (see validate-jekyll-pages.yml).
extends: default

rules:
  # GitHub Actions uses `on:` as a top-level key; yamllint would otherwise
  # flag it as a truthy value.
  truthy:
    allowed-values: ["true", "false"]
    check-keys: false
  # SHA-pinned reusable-workflow `uses:` lines (40-char hash + version
  # comment) can exceed 120 chars and cannot be wrapped. Match the sibling
  # curriculum-vitae repo's threshold and treat over-length as a warning.
  line-length:
    max: 130
    level: warning
  # Jekyll front matter / workflow files commonly omit the document start.
  document-start: disable
  comments:
    min-spaces-from-content: 1
