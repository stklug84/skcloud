# FALLBACK CV DATA — committed so the site builds even if the prebuild
# fetch/parse fails. In CI this file is OVERWRITTEN at build time by the
# `generate` job: it fetches the canonical data/cv.yaml from
# stklug84/curriculum-vitae (main) and runs stklug84/actions/cv/parse@v2
# (web mode), then the reusable workflow extracts the generated cv.yml
# into _data/. To regenerate locally, see scripts/gen-cv.sh / CONTRIBUTING.md.
name: Steffen Klug
title: Cloud Architect
location: Germany
summary: >-
  Cloud architect focused on Azure landing zones, Kubernetes platforms,
  and the developer experience that makes them a pleasure to use.

# Each role appears as a "scene" in the scrollable CV.
# - period:   short label shown in the dates rail (left)
# - year:     used for the timeline marker
# - role:     role title
# - org:      company / organization
# - kind:     work | study | cert  (drives the right-rail icon if no logo set)
# - monogram: 2-letter fallback shown in the right rail when no logo is set
# - logo:     optional path under /assets/img/cv/logos/ — overrides monogram
# - bg:       optional path under /assets/img/cv/bg/ — phasing background image
# - tags:     small keyword chips
# - bullets:  highlight points
roles:
  - period: "2024 — Now"
    year: 2024
    role: "Lead Cloud Architect"
    org: "Confidential Enterprise Client"
    location: "Hybrid · Germany"
    kind: "work"
    monogram: "CE"
    bg: "/assets/img/cv/bg/topology.svg"
    summary: >-
      Leading the design of a multi-subscription Azure platform for a global
      enterprise — landing zones, networking, identity, and the paved-path
      developer experience on top.
    tags: [Azure, Landing Zones, Bicep, AKS, Platform Engineering]
    bullets:
      - "Rolled out a policy-as-code framework with Bicep and GitHub Actions."
      - "Designed a self-service onboarding portal used by 30+ product teams."
      - "Cut average time-to-first-deploy from weeks to a single day."

  - period: "2022 — 2024"
    year: 2022
    role: "Senior Cloud Engineer"
    org: "Independent / Consulting"
    location: "Remote"
    kind: "work"
    monogram: "IC"
    bg: "/assets/img/cv/bg/grid.svg"
    summary: >-
      Worked with several mid-size organizations to modernize workloads on
      Azure — from VM-based estates to containerized, event-driven systems.
    tags: [Azure, AKS, Terraform, GitOps, Observability]
    bullets:
      - "Migrated legacy estates to AKS with GitOps and managed Prometheus."
      - "Introduced Terraform modules and golden paths for product teams."
      - "Mentored engineers on cloud-native patterns and SRE practices."

  - period: "2019 — 2022"
    year: 2019
    role: "DevOps Engineer"
    org: "Earlier Employer"
    location: "Germany"
    kind: "work"
    monogram: "EE"
    bg: "/assets/img/cv/bg/isoline.svg"
    summary: >-
      Built CI/CD pipelines and developer tooling for a fast-growing product
      organization, with a focus on safe, frequent releases.
    tags: [GitHub Actions, Docker, Kubernetes, IaC]
    bullets:
      - "Designed reusable CI/CD workflows shared across 50+ repositories."
      - "Introduced trunk-based development and progressive delivery."
      - "Built internal CLIs and dashboards to reduce platform friction."

  - period: "Before 2019"
    year: 2015
    role: "Software & Systems Engineer"
    org: "Various"
    location: "Germany"
    kind: "work"
    monogram: "SE"
    bg: "/assets/img/cv/bg/dots.svg"
    summary: >-
      Earlier roles spanning software engineering, systems administration,
      and the gradual shift from on-prem to cloud-first architectures.
    tags: [Linux, Networking, Automation]
    bullets:
      - "Operated and automated on-prem and hybrid infrastructure."
      - "Picked up the cloud habit early — and never looked back."

certifications:
