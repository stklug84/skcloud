# Example markdownlint YAML configuration with all properties set to their default value
# ------------------------------------------------------------------------------
# List of deviations from the default:
# - MD010 Hard Tabs in code blocks has been disabled
# - MD013 Line length is 120; tables and code blocks are exempt
# - MD024 Duplicate headings are allowed unless they are siblings
# - MD060 Table column-alignment style check has been disabled
# Jekyll content deviations (posts carry inline HTML / fragment files):
# - MD033 Inline HTML is allowed
# - MD036 Emphasis used instead of a heading is allowed
# - MD040 Fenced code without a language is allowed
# - MD041 First line need not be a top-level heading
# - MD049 Emphasis-style consistency is relaxed
# ------------------------------------------------------------------------------

# Default state for all rules
default: true

# Path to configuration file to extend
extends: null

# MD010/no-hard-tabs - Hard tabs
MD010:
  # Include code blocks
  code_blocks: false
  # Fenced code languages to ignore
  ignore_code_languages: []
  # Number of spaces for each hard tab
  spaces_per_tab: 1

# MD013/line-length - Line length
MD013:
  # Maximum line length
  line_length: 120
  # Exclude tables from the line-length check
  tables: false
  # Exclude code blocks from the line-length check
  code_blocks: false

# MD024/no-duplicate-heading - Multiple headings with the same content
MD024:
  # Only flag duplicates among sibling headings
  siblings_only: true

# MD060/table-column-style - Table column style
MD060: false

# Jekyll content deviations
# MD033/no-inline-html - Inline HTML
MD033: false
# MD036/no-emphasis-as-heading - Emphasis used instead of a heading
MD036: false
# MD040/fenced-code-language - Fenced code blocks should have a language
MD040: false
# MD041/first-line-heading - First line in a file should be a top-level heading
MD041: false
# MD049/emphasis-style - Emphasis style should be consistent
MD049: false
