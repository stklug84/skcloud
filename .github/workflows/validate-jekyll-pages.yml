# PR validation.
#
# Build + advisory quality checks live in the central reusable workflow:
#   stklug84/github-workflows/.github/workflows/jekyll-validate-pages.yml
# This caller owns the trigger, permissions, and concurrency.
#
# Branch protection: the required status check is exposed as `validate / build`.
# The `validate` job key is unchanged, so that check name is preserved. The
# added `generate` job exposes a NEW (non-required) check `generate / Generate
# CV data`; it does not affect the existing `validate / build` required check.
#
# Prebuild flow: a `generate` job fetches the canonical cv.yaml from
# stklug84/curriculum-vitae (raw, from main) and runs
# stklug84/actions/cv/parse in web mode to emit cv.yml. The artifact is
# handed to the reusable workflow via `prebuild-artifact` / `prebuild-into`,
# which extracts cv.yml into _data/ before the Jekyll build.
name: Validate Jekyll Pages

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read

concurrency:
  group: pr-validate-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  # Generate _data/cv.yml from the canonical bilingual cv.yaml.
  generate:
    name: Generate CV data
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch canonical cv.yaml (curriculum-vitae @ main)
        run: |
          set -euo pipefail
          # Fetch the raw file from main. A tracking issue covers
          # switching to a pinned release asset once the source stabilizes.
          SHA="$(gh api repos/stklug84/curriculum-vitae/commits/main -q .sha 2>/dev/null || true)"
          if [ -n "$SHA" ]; then
            echo "Resolved curriculum-vitae main commit: $SHA"
          else
            echo "Could not resolve commit SHA (continuing with raw fetch)."
          fi
          curl -fsSL \
            https://raw.githubusercontent.com/stklug84/curriculum-vitae/main/data/cv.yaml \
            -o cv.yaml
          echo "Fetched cv.yaml ($(wc -c < cv.yaml) bytes)."
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Parse CV (web mode)
        uses: stklug84/actions/cv/parse@cb91fdcefccd47f24449549389216a5981a6455c  # v2.2.1
        with:
          mode: web
          source: cv.yaml
          out-dir: "."

      - name: Upload cv.yml artifact
        uses: actions/upload-artifact@v4
        with:
          name: cv-web-data
          path: cv.yml
          if-no-files-found: error

  # Build + advisory checks via the reusable workflow. The `validate` job key
  # is preserved so the required check `validate / build` is unchanged.
  validate:
    needs: generate
    uses: stklug84/github-workflows/.github/workflows/jekyll-validate-pages.yml@ef8ccb7f951405e721fa4891008c45c47eb8dcb8  # v1.6.0
    with:
      prebuild-artifact: cv-web-data
      prebuild-into: "_data"
