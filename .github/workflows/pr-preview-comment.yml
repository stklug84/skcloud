---
# title: PR preview comment workflow
# authors:
#   - Steffen Klug <45033201+stklug84@users.noreply.github.com>
# date: 2026-06-22
# keywords: [infrastructure, jekyll, ci]
# comment: |
#   Posts a sticky PR comment with the preview URL. The sticky-comment
#   logic lives in the central reusable workflow:
#     stklug84/github-workflows/.github/workflows/misc-pr-preview-comment.yml
#   This caller owns the trigger, permissions, and concurrency.
# ---
name: PR preview comment

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: pr-preview-comment-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  comment:
    uses: stklug84/github-workflows/.github/workflows/misc-pr-preview-comment.yml@v1.17.0
    with:
      preview-domain: https://blutoniumstrom.com
