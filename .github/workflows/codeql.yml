---
# CodeQL code scanning.
#
# Required by the "Deploy productive" branch ruleset (code_scanning rule,
# tool: CodeQL). Analyzes:
#   - actions:    the workflows in .github/workflows/* (expression
#                 injection, excessive permissions, untrusted checkout, ...)
#   - javascript: the vanilla JS in assets/js/
#
# Modeled on stklug84/github-workflows/.github/workflows/codeql.yml.
name: CodeQL

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  schedule:
    # Weekly run to pick up newly released queries.
    - cron: '45 5 * * 1'

permissions:
  contents: read

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
      actions: read
    strategy:
      fail-fast: false
      matrix:
        language:
          - actions
          - javascript-typescript
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: none
          queries: security-extended

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:${{ matrix.language }}
