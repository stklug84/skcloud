# Production deploy to GitHub Pages.
#
# The build/deploy logic lives in the central reusable workflow:
#   stklug84/github-workflows/.github/workflows/jekyll-deploy-pages.yml
# This file owns the triggers, permissions, and concurrency, then
# delegates the actual build (Bundler) and deploy.
#
# Prebuild flow: a `generate` job fetches the canonical cv.yml
# from stklug84/curriculum-vitae (raw, from main) and runs
# stklug84/actions/cv/parse in web mode to emit cv.yml. The artifact
# is handed to the reusable workflow via `prebuild-artifact` /
# `prebuild-into`, which extracts cv.yml into _data/ before the Jekyll
# build (overwriting the committed fallback _data/cv.yml).
name: Deploy Jekyll to GitHub Pages

on:
  # Runs on pushes targeting the default branch (production deploy)
  push:
    branches: [main]

  # Allows you to run this workflow manually from the Actions tab (escape hatch)
  workflow_dispatch:

# The caller must grant the scopes the reusable workflow needs.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run
# in-progress and latest queued. Do NOT cancel in-progress production deploys.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Generate _data/cv.yml from the canonical bilingual cv.yml.
  generate:
    name: Generate CV data
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Fetch canonical cv.yml (curriculum-vitae @ main)
        run: |
          set -euo pipefail
          # Fetch the raw file from main. A tracking issue covers
          # switching to a pinned release asset once the source stabilizes.
          SHA="$(gh api repos/stklug84/curriculum-vitae/commits/main -q .sha 2>/dev/null || true)"
          if [ -n "$SHA" ]; then
            echo "Resolved curriculum-vitae main commit: $SHA"
          else
            echo "Could not resolve commit SHA (continuing with raw fetch)."
          fi
          curl -fsSL \
            https://raw.githubusercontent.com/stklug84/curriculum-vitae/main/data/cv.yml \
            -o cv.yml
          echo "Fetched cv.yml ($(wc -c < cv.yml) bytes)."
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Parse CV (web mode)
        uses: stklug84/actions/cv/parse@cb91fdcefccd47f24449549389216a5981a6455c  # v2.2.1
        with:
          mode: web
          source: cv.yml
          out-dir: "."

      - name: Upload cv.yml artifact
        uses: actions/upload-artifact@v7
        with:
          name: cv-web-data
          path: cv.yml
          if-no-files-found: error

  # Build + deploy via the reusable workflow. Job-level `uses:` with
  # `needs:` is valid; a reusable-workflow call job may only have
  # uses/with/needs/secrets (no steps).
  deploy:
    needs: generate
    uses: stklug84/github-workflows/.github/workflows/jekyll-deploy-pages.yml@ef8ccb7f951405e721fa4891008c45c47eb8dcb8  # v1.6.0
    with:
      prebuild-artifact: cv-web-data
      prebuild-into: "_data"
