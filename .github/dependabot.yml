---
# title: Dependabot version updates configuration
# authors:
#   - Steffen Klug <45033201+stklug84@users.noreply.github.com>
# date: 2026-06-22
# keywords: [infrastructure, dependencies]
# comment: |
#   Grouped weekly version updates — one PR per ecosystem per week
#   instead of one PR per dependency:
#     - bundler:        jekyll + plugins (minor/patch grouped; majors
#                       stay separate so breaking changes are reviewed
#                       individually)
#     - github-actions: all action/reusable-workflow bumps grouped
#   Documentation:
#   https://docs.github.com/code-security/dependabot/dependabot-version-updates
# ---
version: 2

updates:
  - package-ecosystem: bundler
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Berlin
    groups:
      ruby-minor-and-patch:
        applies-to: version-updates
        update-types:
          - minor
          - patch
      ruby-security:
        applies-to: security-updates
        patterns:
          - "*"
    labels:
      - dependencies
      - ruby
    commit-message:
      prefix: "chore(deps)"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Berlin
    groups:
      actions:
        applies-to: version-updates
        patterns:
          - "*"
      actions-security:
        applies-to: security-updates
        patterns:
          - "*"
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: "ci(deps)"
